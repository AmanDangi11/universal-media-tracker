<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Media Tracker</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-blue: #38bdf8;
      --accent-green: #10b981;
      --accent-red: #f43f5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      padding: 20px;
      background: var(--bg-gradient);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 24px;
    }

    h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge-live {
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 9999px;
      color: var(--accent-blue);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.15);
    }

    .btn {
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
      border: none;
      border-radius: 8px;
      color: #0f172a;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      padding: 10px;
      text-align: center;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.15);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(56, 189, 248, 0.25);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status-area {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.4);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      background-color: var(--text-secondary);
      display: inline-block;
    }

    .dot.connected {
      background-color: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
    }

    .dot.error {
      background-color: var(--accent-red);
      box-shadow: 0 0 8px var(--accent-red);
    }

    .test-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      transition: all 0.2s;
    }

    .test-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    footer {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
    }

    a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .success-msg {
      color: var(--accent-green);
      font-size: 12px;
      text-align: center;
      margin-top: 4px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-section">
        <span class="logo-icon">✨</span>
        <h1>Media Tracker</h1>
      </div>
      <span class="badge-live">Auto-Track</span>
    </header>

    <main class="card">
      <div class="form-group">
        <label for="apiUrl">Server API URL</label>
        <input type="url" id="apiUrl" placeholder="http://localhost:5001" />
      </div>

      <div class="form-group">
        <label for="token">User Session Token</label>
        <input type="password" id="token" placeholder="Paste JWT token here..." />
      </div>

      <button id="saveBtn" class="btn">Save & Connect</button>
      <div id="successMsg" class="success-msg">Settings saved successfully!</div>
    </main>

    <section class="card">
      <div class="status-area">
        <div class="status-indicator">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Disconnected</span>
        </div>
        <button id="testBtn" class="test-btn">Test Connection</button>
      </div>
    </section>

    <footer>
      <p>Log in to the web app, copy your token under profile or local storage, and paste it here.</p>
      <p>Visit: <a href="http://localhost:3000" target="_blank" id="webAppLink">Tracker Dashboard ↗</a></p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
